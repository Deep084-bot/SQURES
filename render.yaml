services:
  - type: web
    name: squres
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd squres && gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.9
